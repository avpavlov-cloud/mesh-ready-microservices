apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v1           # Имя нашего развертывания
  namespace: mrm-project      # Наше изолированное пространство с Istio
  labels:
    app: backend              # Общая метка для всех версий бэкенда
    version: v1               # Метка версии (критично для Service Mesh)
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
      version: v1
  template:
    metadata:
      labels:
        app: backend
        version: v1
    spec:
      containers:
      - name: backend
        image: mrm-backend:v1
        imagePullPolicy: Never # Говорим K8s брать образ из локального Docker Minikube
        ports:
        - containerPort: 8080
        env:
        - name: VERSION
          value: "v1"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service      # Имя, по которому Frontend будет искать Backend
  namespace: mrm-project
spec:
  selector:
    app: backend              # Сервис будет слать трафик на все поды с меткой app: backend
  ports:
  - protocol: TCP
    port: 8080                # Порт сервиса
    targetPort: 8080          # Порт внутри контейнера
